# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - app-gbcontainer

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: crkdk.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_E15B9D9C89C84530A697A6AA5C3EE467 }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_A9BA8BE67E6F418990D541776DE0E1DA }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: crkdk.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_E15B9D9C89C84530A697A6AA5C3EE467 }}/guestbook:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    
    needs: build
    
    steps:
      
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'app-gbcontainer'
          slot-name: 'Production'
          images: 'crkdk.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_E15B9D9C89C84530A697A6AA5C3EE467 }}/guestbook:${{ github.sha }}'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_84D661071E5B4CDB8590E7034E1C6CD5 }}